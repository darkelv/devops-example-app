name: main

on:
  push:
    branches:
      - 'main'

env:
  APP_IMAGE_REPOSITORY: devops-example-app
  CADDY_IMAGE_REPOSITORY: devops-example-caddy
  TEST_TAG: devops-example-app:test

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and export to Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.TEST_TAG }}

      - run: make compose-test-ci
      - run: make compose-lint-ci

      - name: Build and push app
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_REPOSITORY }}:latest

      - name: Build and push caddy
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/caddy/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE_REPOSITORY }}:latest
