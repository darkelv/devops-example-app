name: release

on:
  create:
    tags:
      - v*

env:
  APP_IMAGE_REPOSITORY: devops-example-app
  CADDY_IMAGE_REPOSITORY: devops-example-caddy

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      # - uses: actions/checkout@v2
      # - uses: docker/setup-qemu-action@v1
      # - uses: docker/setup-buildx-action@v1

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_REPOSITORY }}:latest
      - run: docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_REPOSITORY }}:latest ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_REPOSITORY }}:${{ github.ref_name }}
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_IMAGE_REPOSITORY }}:${{ github.ref_name }}

      - run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE_REPOSITORY }}:latest
      - run: docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE_REPOSITORY }}:latest ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE_REPOSITORY }}:${{ github.ref_name }}
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CADDY_IMAGE_REPOSITORY }}:${{ github.ref_name }}
